services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: short-link
    container_name: php-short-link
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - short-link-network
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    container_name: mysql-short-link
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: r00t
      MYSQL_DATABASE: short-link
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    networks:
      - short-link-network
    volumes:
      - mysql_data:/var/lib/mysql
  nginx:
    image: nginx:alpine
    container_name: short-link-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - short-link-network
    depends_on:
      - php
networks:
  short-link-network:
    driver: bridge
volumes:
  mysql_data:
